name: Persian Date Picker CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle


      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run date_picker unit tests
        run: ./gradlew :date_picker:testDebugUnitTest

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '**/build/test-results/testDebugUnitTest/*.xml'

      - name: Build date_picker library
        run: ./gradlew :date_picker:assembleDebug

      - name: Build app
        run: ./gradlew :app:assembleDebug
